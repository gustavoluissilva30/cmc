<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>CMPC · Atualização de Preços</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#263347;--border:#334155;
  --accent:#38bdf8;--accent2:#818cf8;--green:#34d399;--yellow:#fbbf24;--red:#f87171;
  --text:#f1f5f9;--muted:#94a3b8;--radius:12px;
  --nav:56px;--bottom:72px;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;display:flex;flex-direction:column}

/* NAV */
.nav{height:var(--nav);background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo{width:32px;height:32px;background:linear-gradient(135deg,#38bdf8,#818cf8);
  border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.nav-title{font-size:15px;font-weight:700;color:var(--text)}
.nav-title small{color:var(--muted);font-weight:400;font-size:12px;display:block;margin-top:-2px}
.nav-count{background:var(--green);color:#065f46;font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:20px}

/* SEARCH */
.search-bar{background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;gap:8px;flex-shrink:0}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px 10px 38px;color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:15px}
.filter-btn{background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;color:var(--muted);font-size:13px;
  font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px}
.filter-btn.on{border-color:var(--accent);color:var(--accent)}

/* STRIP */
.strip{background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 16px;display:flex;gap:0;flex-shrink:0;overflow-x:auto}
.strip-item{flex:1;min-width:80px;text-align:center}
.strip-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--text)}
.strip-lbl{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-top:1px}
.strip-div{width:1px;background:var(--border);margin:4px 0}

/* CARD LIST */
.list{flex:1;overflow-y:auto;padding:12px 16px;-webkit-overflow-scrolling:touch}
.item-card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.item-card.done{border-color:#065f46;background:#052e16}
.item-card.partial{border-color:#92400e}

.card-top{padding:12px 14px 10px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-left{flex:1;min-width:0}
.card-cod{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:2px}
.card-desc{font-size:13px;font-weight:600;line-height:1.3;color:var(--text)}
.card-cat{font-size:10px;font-weight:600;margin-top:4px;display:inline-block;
  padding:2px 8px;border-radius:20px}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.card-ref{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
.card-ref-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* FORNECEDORES DOTS */
.forn-dots{display:flex;gap:4px;margin-top:4px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.dot.f1{background:#38bdf8}
.dot.f2{background:#818cf8}
.dot.f3{background:#34d399}

/* BODY */
.card-body{display:none;border-top:1px solid var(--border);background:var(--surface2)}
.card-body.open{display:block}

.ref-row{display:flex;gap:16px;padding:10px 14px 0;border-bottom:1px solid var(--border);padding-bottom:10px}
.ref-item{flex:1}
.ref-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.ref-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--text)}

/* FORNECEDOR SECTIONS */
.forn-section{padding:10px 14px;border-bottom:1px solid var(--border)}
.forn-section:last-of-type{border-bottom:none}
.forn-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.forn-tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
.forn-tag.f1{background:rgba(56,189,248,.15);color:#38bdf8;border:1px solid rgba(56,189,248,.3)}
.forn-tag.f2{background:rgba(129,140,248,.15);color:#818cf8;border:1px solid rgba(129,140,248,.3)}
.forn-tag.f3{background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.3)}
.forn-updated{font-size:10px;color:var(--muted)}

.forn-fields{display:flex;gap:8px}
.field-wrap{flex:1}
.field-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.field-input{width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:10px 10px;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:14px;outline:none;
  transition:border-color .15s}
.field-input.text-input{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px}
.field-input:focus{border-color:var(--accent)}

.forn-updated-block{display:none;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);
  border-radius:8px;padding:8px 10px;margin-top:8px}
.forn-updated-block.show{display:block}
.forn-upd-price{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--green)}
.forn-upd-name{font-size:12px;color:#34d399;margin-top:1px}
.forn-upd-date{font-size:10px;color:var(--muted);margin-top:1px}

.save-btn{width:100%;background:var(--accent);color:#0c4a6e;border:none;
  border-radius:8px;padding:11px;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .15s}
.save-btn:active{opacity:.85}
.edit-btn{background:transparent;border:1px solid var(--border);border-radius:6px;
  padding:4px 10px;font-size:11px;color:var(--muted);cursor:pointer}

/* DRAWER */
.drawer{position:fixed;inset:0;z-index:300;pointer-events:none}
.d-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .25s}
.drawer.open .d-overlay{background:rgba(0,0,0,.6);pointer-events:all}
.d-panel{position:absolute;bottom:0;left:0;right:0;background:var(--surface);
  border-radius:20px 20px 0 0;padding:0 0 40px;transform:translateY(100%);
  transition:transform .3s cubic-bezier(.32,.72,0,1);pointer-events:all;max-height:80vh;overflow-y:auto}
.drawer.open .d-panel{transform:translateY(0)}
.d-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.d-title{padding:14px 16px 8px;font-size:12px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.8px}
.d-section{padding:0 16px 12px}
.d-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;
  border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer}
.chip.on{border-color:var(--accent);color:var(--accent);background:rgba(56,189,248,.1)}
.cat-sel{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:13px;outline:none}
.d-btns{padding:12px 16px 0;display:flex;gap:8px}
.d-btn{flex:1;padding:13px;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;border:none}
.d-btn-primary{background:var(--accent);color:#0c4a6e}
.d-btn-outline{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}

/* BOTTOM */
.bottom{height:var(--bottom);background:var(--surface);border-top:1px solid var(--border);
  padding:10px 16px;display:flex;gap:8px;align-items:center;flex-shrink:0}
.export-btn{flex:1;background:var(--green);color:#065f46;border:none;border-radius:12px;
  padding:14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.trash-btn{background:var(--surface2);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;font-size:18px;cursor:pointer;color:var(--muted)}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--bottom) + 12px);left:16px;right:16px;z-index:500;
  padding:13px 18px;border-radius:12px;font-size:13px;font-weight:600;text-align:center;
  transform:translateY(20px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:var(--green);color:#065f46}
.toast.err{background:var(--red);color:#7f1d1d}

/* empty */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
</style>
</head>

let updates = {};
try{updates=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch(e){}

let filtered = [];
let activeFilter = '';
let openCard = null;

// populate categories
const cats = [...new Set(ITEMS.map(i=>i.cat))].sort();
const cf = document.getElementById('catFilter');
cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cf.appendChild(o)});

const fmtBRL = v=>'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN = v=>Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const key = item=>item.cod+'|'+item.desc;

function getItemUpdate(k){return updates[k]||{f1:{},f2:{},f3:{}}}
function countFilled(u){return [u.f1,u.f2,u.f3].filter(f=>f&&f.preco&&f.nome).length}

function applyFilters(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const cat=document.getElementById('catFilter').value;
  filtered=ITEMS.filter(item=>{
    if(q&&!item.cod.toLowerCase().includes(q)&&!item.desc.toLowerCase().includes(q))return false;
    if(cat&&item.cat!==cat)return false;
    const u=getItemUpdate(key(item));
    const n=countFilled(u);
    if(activeFilter==='done'&&n<3)return false;
    if(activeFilter==='partial'&&(n===0||n===3))return false;
    if(activeFilter==='pending'&&n>0)return false;
    return true;
  });
  renderAll();
}

function renderAll(){
  renderStrip();
  renderCards();
  const fc=[document.getElementById('catFilter').value,activeFilter].filter(Boolean).length;
  document.getElementById('filterBtn').classList.toggle('on',fc>0);
  document.getElementById('navCount').textContent=Object.keys(updates).filter(k=>{
    const u=updates[k];return countFilled(u)>=1;
  }).length+' ✓';
}

function renderStrip(){
  const n=filtered.length;
  let upd=0,three=0;
  filtered.forEach(item=>{
    const u=getItemUpdate(key(item));
    const c=countFilled(u);
    if(c>0)upd++;
    if(c===3)three++;
  });
  document.getElementById('sItens').textContent=n;
  document.getElementById('sAtualizados').textContent=upd;
  document.getElementById('s3Forn').textContent=three;
  document.getElementById('sPendentes').textContent=n-upd;
}

function renderCards(){
  const list=document.getElementById('cardList');
  if(!filtered.length){list.innerHTML='<div class="empty">Nenhum item encontrado</div>';return;}
  list.innerHTML=filtered.map((item,idx)=>{
    const k=key(item);
    const u=getItemUpdate(k);
    const n=countFilled(u);
    const color=CAT_COLORS[item.cat]||'#94a3b8';
    const cardClass=n===3?'done':n>0?'partial':'';
    const isOpen=openCard===k;

    const dot1=u.f1&&u.f1.nome?'f1':'';
    const dot2=u.f2&&u.f2.nome?'f2':'';
    const dot3=u.f3&&u.f3.nome?'f3':'';

    return `<div class="item-card ${cardClass}" id="card_${idx}">
      <div class="card-top" onclick="toggleCard('${k}','${idx}')">
        <div class="card-left">
          <div class="card-cod">${item.cod}</div>
          <div class="card-desc">${item.desc}</div>
          <span class="card-cat" style="background:${color}22;color:${color};border:1px solid ${color}44">${item.cat.split(' ').slice(0,3).join(' ')}</span>
          <div class="forn-dots">
            <div class="dot ${dot1}"></div>
            <div class="dot ${dot2}"></div>
            <div class="dot ${dot3}"></div>
          </div>
        </div>
        <div class="card-right">
          <div class="card-ref">${fmtBRL(item.preco_ref)}</div>
          <div class="card-ref-lbl">Ref.</div>
        </div>
      </div>
      <div class="card-body ${isOpen?'open':''}" id="body_${k}">
        <div class="ref-row">
          <div class="ref-item"><div class="ref-lbl">Unid.</div><div class="ref-val">${item.unid}</div></div>
          <div class="ref-item"><div class="ref-lbl">Quant.</div><div class="ref-val">${fmtN(item.quant)}</div></div>
          <div class="ref-item"><div class="ref-lbl">Preço ref.</div><div class="ref-val">${fmtBRL(item.preco_ref)}</div></div>
        </div>
        ${[1,2,3].map(n=>`
        <div class="forn-section">
          <div class="forn-header">
            <span class="forn-tag f${n}">Fornecedor ${n}</span>
            ${u['f'+n]&&u['f'+n].data?`<span class="forn-updated">Atualizado ${u['f'+n].data}</span>`:''}
          </div>
          ${u['f'+n]&&u['f'+n].nome?`
          <div class="forn-updated-block show">
            <div class="forn-upd-price">${fmtBRL(u['f'+n].preco)}</div>
            <div class="forn-upd-name">🏢 ${u['f'+n].nome}</div>
            <div class="forn-upd-date">🕐 ${u['f'+n].data} ${u['f'+n].hora}</div>
          </div>
          <button class="edit-btn" onclick="editForn(event,'${k}',${n})">Editar</button>
          `:`
          <div class="forn-fields">
            <div class="field-wrap" style="flex:1.4">
              <div class="field-lbl">Fornecedor</div>
              <input class="field-input text-input" type="text" id="nome_${k}_${n}" placeholder="Nome do fornecedor">
            </div>
            <div class="field-wrap">
              <div class="field-lbl">Preço (R$)</div>
              <input class="field-input" type="number" inputmode="decimal" step="0.01" id="preco_${k}_${n}" placeholder="0,00">
            </div>
          </div>
          <button class="save-btn" onclick="saveForn(event,'${k}',${n},'${item.cod}')">✓ Salvar Fornecedor ${n}</button>
          `}
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleCard(k,idx){
  if(openCard===k){
    const b=document.getElementById('body_'+k);
    if(b)b.classList.remove('open');
    openCard=null;
  } else {
    if(openCard){const b=document.getElementById('body_'+openCard);if(b)b.classList.remove('open');}
    openCard=k;
    const b=document.getElementById('body_'+k);
    if(b){
      b.classList.add('open');
      setTimeout(()=>b.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
    }
  }
}

function saveForn(e,k,n,cod){
  e.stopPropagation();
  const nome=document.getElementById('nome_'+k+'_'+n)?.value?.trim();
  const precoStr=document.getElementById('preco_'+k+'_'+n)?.value;
  const preco=parseFloat(precoStr?.replace(',','.'));
  if(!nome){showToast('Informe o nome do fornecedor!','err');return;}
  if(isNaN(preco)||preco<=0){showToast('Informe um preço válido!','err');return;}

  // Check if same supplier name exists in another slot — update that slot
  const u=getItemUpdate(k);
  let slot='f'+n;
  [1,2,3].forEach(i=>{
    if(i!==n&&u['f'+i]&&u['f'+i].nome&&u['f'+i].nome.toLowerCase()===nome.toLowerCase()){
      slot='f'+i;
    }
  });

  if(!updates[k])updates[k]={f1:{},f2:{},f3:{}};
  updates[k][slot]={
    nome,preco,
    data:new Date().toLocaleDateString('pt-BR'),
    hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
  };
  localStorage.setItem(STORAGE_KEY,JSON.stringify(updates));
  showToast('✓ '+cod+' — Fornecedor salvo!','ok');
  openCard=k;
  applyFilters();
  setTimeout(()=>{const b=document.getElementById('body_'+k);if(b){b.classList.add('open');}},50);
}

function editForn(e,k,n){
  e.stopPropagation();
  const u=getItemUpdate(k);
  if(!updates[k])updates[k]={f1:{},f2:{},f3:{}};
  updates[k]['f'+n]={};
  localStorage.setItem(STORAGE_KEY,JSON.stringify(updates));
  openCard=k;
  applyFilters();
  setTimeout(()=>{const b=document.getElementById('body_'+k);if(b){b.classList.add('open');}},50);
}

function exportCSV(){
  const rows=[['Código','Descrição','Categoria','Unidade','Quantidade','Preço Ref.',
    'Forn.1 Nome','Forn.1 Preço','Forn.1 Data',
    'Forn.2 Nome','Forn.2 Preço','Forn.2 Data',
    'Forn.3 Nome','Forn.3 Preço','Forn.3 Data']];
  ITEMS.forEach(item=>{
    const u=getItemUpdate(key(item));
    rows.push([
      item.cod,'"'+item.desc+'"','"'+item.cat+'"',item.unid,item.quant,item.preco_ref,
      u.f1?.nome||'',u.f1?.preco||'',u.f1?.data||'',
      u.f2?.nome||'',u.f2?.preco||'',u.f2?.data||'',
      u.f3?.nome||'',u.f3?.preco||'',u.f3?.data||''
    ]);
  });
  const csv=rows.map(r=>r.join(';')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download='cmpc_precos_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();URL.revokeObjectURL(url);
  showToast('CSV exportado!','ok');
}

function clearAll(){
  if(!confirm('Limpar todas as atualizações?'))return;
  updates={};localStorage.removeItem(STORAGE_KEY);
  showToast('Dados removidos.','err');applyFilters();
}

function openDrawer(){document.getElementById('drawer').classList.add('open')}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');applyFilters()}
function setFilter(el,val){
  activeFilter=val;
  document.querySelectorAll('[data-f]').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}
function resetFilters(){
  activeFilter='';
  document.getElementById('catFilter').value='';
  document.querySelectorAll('[data-f]').forEach(c=>c.classList.remove('on'));
  document.querySelector('[data-f=""]').classList.add('on');
  closeDrawer();
}

let tt;
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  clearTimeout(tt);tt=setTimeout(()=>t.className='toast',2800);
}

document.getElementById('searchInput').addEventListener('input',applyFilters);
applyFilters();
</script>
</body>
